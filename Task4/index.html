<!doctype html>

  <body>
    <header>
      <div id="navbar">
        <div id="left-nav">
          <div class="logo">

          <div class="logo-name">

            Hunters
          </div>
        </div>
        <div id="mid-nav">
          <a href=""
            >Home
            <div class="bottom-border"></div>
          </a>
          <a href=""

            <div class="bottom-border"></div>

          <a href=""

          </a>
          <a href=""

            <div class="bottom-border"></div>
